<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HypeVoice Lobby - Premium</title>
    <link rel="stylesheet" href="lobby.css">
  <link rel="stylesheet" href="toast.css">
  <script src="toast.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="lobby-container">
<header class="top-nav">
    <div class="user-pill" onclick="window.location.href='profile.html'">
        <img src="profile.png" id="lobby-avatar" alt="User">
        <div class="user-meta">
            <span id="lobby-username">Loading...</span>
            <div class="coin-badge">
                <span class="material-icons">monetization_on</span>
                <span id="lobby-coins">0</span>
            </div>
        </div>
    </div>
    </header>

    <section class="hero-section">
        <div class="hero-card">
            <div class="hero-text">
                <h2>Panggung Utama</h2>
                <p>Jadilah bintang hari ini dan kumpulkan koin hope</p>
<button class="btn-primary-neon" onclick="handleStartSinging()">ROOM KAMU</button>

            </div>
            <div class="hero-overlay-glow"></div>
        </div>
    </section>

    <main class="room-section">
        <div class="section-header">
            <h3>Panggung Aktif</h3>
            <div class="tabs">
                <span class="active">Populer</span>
                <span>Musik</span>
                <span>Chat</span>
            </div>
        </div>

        <div id="room-list" class="room-list-container">
            <div class="loader">Memanggil Panggung...</div>
        </div>
    </main>
</div>

<button class="fab-create" onclick="createRoom()">
    <span class="material-icons">add</span>
</button>
<div id="modal-create" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>BUAT PANGGUNG BARU</h3>
        <p>Tentukan nama panggung dan ajak temanmu bernyanyi!</p>
        
        <div class="input-group">
            <label>Nama Room</label>
            <input type="text" id="new-room-name" placeholder="Nama room kamu">
        </div>

        <div class="input-group">
            <label>Deskripsi</label>
            <textarea id="new-room-desc" placeholder="Bahas tentang apa.."></textarea>
        </div>

        <div class="input-group">
            <label>Kategori</label>
            <select id="new-room-category" class="custom-select">
                <option value="Musik">Musik dan Nyanyi</option>
                <option value="Chat">Chat dan Nongkrong</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">BATAL</button>
            <button class="btn-confirm" onclick="confirmCreateRoom()">BUAT SEKARANG</button>
        </div>
    </div>
</div>


<script src="lobby.js"></script>
</body>
</html>
